[pytest]
testpaths = .
python_files =
    test_*.py
    *.test.py
    *_test.py
    *_tests.py
markers =
    bug: regression tests (bug id as argument)
    gpu: tests that require a GPU
    docker: tests that ONLY run inside Docker
    native: tests that ONLY run natively (not in Docker)
    slow: tests that take a long time
    uv: tests that require the uv installed
    conda: tests that require conda installed
    cli: tests that run "./isaaclab.sh -i"
timeout = 1200
addopts = --import-mode=importlib
