# Windows CI on self-hosted GPU runners. Single consolidated job so the
# autoscaler can't tear the runner between sub-jobs. Kit-launching steps
# use Start-Process + WaitForExit as an OS-level watchdog (Python thread
# watchdogs are GIL-vulnerable). pytest uses --timeout-method=thread
# (SIGALRM is Unix-only).

name: Windows CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop
      - 'release/**'
  push:
    branches:
      - main
      - develop
      - 'release/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

# EULA + headless env. Without these Kit bootstrap blocks on stdin
# ("Unable to bootstrap inner kit kernel: EOF when reading a line") or
# the global watchdog kills the headless process. Mirrors PR #4018.
env:
  OMNI_KIT_ACCEPT_EULA: "yes"
  ACCEPT_EULA: "Y"
  ISAACSIM_ACCEPT_EULA: "YES"
  PRIVACY_CONSENT: "Y"
  HEADLESS: "1"
  ISAAC_SIM_HEADLESS: "1"
  ISAAC_SIM_LOW_MEMORY: "1"
  WINDOWS_PLATFORM: "true"
  OMNI_KIT_NO_WINDOW: "1"
  OMNI_KIT_DISABLE_WATCHDOG: "1"
  OMNI_KIT_TELEMETRY: "0"
  CARB_LOGGING_SEVERITY: "error"
  PYTHONUNBUFFERED: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      run_windows_ci: ${{ steps.detect.outputs.run_windows_ci }}
    steps:
      - id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          patterns=(
            $'^source/\tLibrary source code'
            $'^tools/\tBuild tooling'
            $'^apps/\tStandalone apps'
            $'(^|/)pyproject\\.toml$\tPython project metadata'
            $'^\\.github/workflows/windows-ci\\.yaml$\tThis workflow file'
            $'^VERSION$\tVersion file'
          )
          any_match() {
            local files="$1" entry regex
            for entry in "${patterns[@]}"; do
              IFS=$'\t' read -r regex _ <<< "$entry"
              if grep -qE "$regex" <<< "$files"; then
                return 0
              fi
            done
            return 1
          }
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "run_windows_ci=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed_files="$(gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/files" --jq '.[].filename' || true)"
          if [ -z "$changed_files" ] || any_match "$changed_files"; then
            echo "run_windows_ci=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_windows_ci=false" >> "$GITHUB_OUTPUT"
          fi

  windows-ci:
    name: windows-ci
    needs: [changes]
    if: needs.changes.outputs.run_windows_ci == 'true'
    runs-on: [self-hosted, gpu-windows]
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false

      - name: Report instance state (BEFORE)
        uses: ./.github/actions/windows-instance-state
        with: { phase: pre }

      # Diagnostic: independent probe of the Vulkan loader on the runner.
      # First runnable step — no Isaac Sim install needed. Captures
      # nvidia-smi (driver + driver-mode), Vulkan loader presence in
      # System32, the Khronos ICD registry keys, and a ctypes call into
      # vulkan-1.dll to mirror what vulkaninfo would do. Output goes to
      # reports/vulkan-probe.txt and is uploaded as the windows-ci-reports
      # artifact. All other test steps are gated off (if: false) for now —
      # this job exists purely to surface what the Vulkan ICD stack sees
      # on the L40S Windows runner. Restore the disabled steps once the
      # Vulkan blocker is resolved.
      - name: Vulkan probe (nvidia-smi + vulkaninfo)
        id: vulkan-probe
        shell: powershell
        timeout-minutes: 5
        run: |
          $ErrorActionPreference = "Continue"
          New-Item -ItemType Directory -Force -Path "reports" | Out-Null
          $log = "reports/vulkan-probe.txt"

          "=== host info ===" | Tee-Object $log
          "Date: $(Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ')" | Tee-Object $log -Append
          "Machine: $env:COMPUTERNAME" | Tee-Object $log -Append
          "" | Tee-Object $log -Append

          "=== nvidia-smi ===" | Tee-Object $log -Append
          nvidia-smi 2>&1 | Tee-Object $log -Append
          "" | Tee-Object $log -Append

          "=== nvidia-smi -q -d COMPUTE,DISPLAY ===" | Tee-Object $log -Append
          nvidia-smi -q -d COMPUTE,DISPLAY 2>&1 | Tee-Object $log -Append
          "" | Tee-Object $log -Append

          "=== vulkan-1.dll search (System32 + SysWOW64) ===" | Tee-Object $log -Append
          Get-ChildItem -Path C:\Windows\System32, C:\Windows\SysWOW64 -Filter vulkan-1.dll -EA SilentlyContinue | Format-List FullName,Length,LastWriteTime | Out-String | Tee-Object $log -Append

          "=== Vulkan ICD registry (HKLM:\SOFTWARE\Khronos\Vulkan\Drivers) ===" | Tee-Object $log -Append
          Get-ItemProperty -Path 'HKLM:\SOFTWARE\Khronos\Vulkan\Drivers' -EA SilentlyContinue | Out-String | Tee-Object $log -Append
          "=== Vulkan ICD registry (HKLM:\SOFTWARE\WOW6432Node\Khronos\Vulkan\Drivers) ===" | Tee-Object $log -Append
          Get-ItemProperty -Path 'HKLM:\SOFTWARE\WOW6432Node\Khronos\Vulkan\Drivers' -EA SilentlyContinue | Out-String | Tee-Object $log -Append
          "" | Tee-Object $log -Append

          "=== vulkaninfo ===" | Tee-Object $log -Append
          $vk = Get-Command vulkaninfo -EA SilentlyContinue
          if ($vk) {
            "vulkaninfo on PATH: $($vk.Source)" | Tee-Object $log -Append
            & vulkaninfo --summary 2>&1 | Tee-Object $log -Append
          } else {
            "vulkaninfo NOT on PATH; using ctypes probe (tools/vulkan_probe.py) via system Python" | Tee-Object $log -Append
            $py = $null
            foreach ($cand in @("py.exe", "python.exe")) {
              $c = Get-Command $cand -EA SilentlyContinue
              if ($c) { $py = $c.Source; break }
            }
            if (-not $py) {
              "No system Python found; ctypes probe skipped." | Tee-Object $log -Append
            } else {
              "Using Python: $py" | Tee-Object $log -Append
              & $py tools/vulkan_probe.py 2>&1 | Tee-Object $log -Append
            }
          }

          "" | Tee-Object $log -Append
          "=== probe complete ===" | Tee-Object $log -Append

      - name: Install uv
        if: false  # disabled: probe-only iteration
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Get-Command uv -ErrorAction SilentlyContinue)) {
            irm https://astral.sh/uv/install.ps1 | iex
          }
          Add-Content -Path $env:GITHUB_PATH -Value "$HOME\.local\bin"

      - name: Setup venv + install isaaclab + isaacsim + test deps
        id: setup
        if: false  # disabled: probe-only iteration
        shell: powershell
        timeout-minutes: 25
        run: |
          $ErrorActionPreference = "Stop"
          uv venv --python 3.12 --seed env_isaaclab_uv
          & "env_isaaclab_uv\Scripts\Activate.ps1"
          uv pip install pytest pytest-timeout h5py
          .\isaaclab.bat -i 'isaacsim,rl[rsl_rl,rl_games]'
          python -c "import isaaclab, isaaclab_assets, isaaclab_tasks, isaaclab_newton, isaaclab_physx, isaaclab_ppisp; print('editable imports ok')"
          New-Item -ItemType Directory -Force -Path "reports" | Out-Null

      - name: Resolve Isaac Sim paths (ISAAC_PATH / CARB_APP_PATH / EXP_PATH / DLL search)
        id: sim-paths
        if: false  # disabled: probe-only iteration
        uses: ./.github/actions/windows-sim-paths
        with: { venv-path: 'env_isaaclab_uv' }

      # ===== Test branches (each independent, continue-on-error). =====

      - name: Deps smoke (torch + scipy)
        id: test-deps
        if: false  # disabled: probe-only iteration
        continue-on-error: true
        shell: powershell
        timeout-minutes: 5
        run: |
          $ErrorActionPreference = "Stop"
          & "env_isaaclab_uv\Scripts\Activate.ps1"
          python -m pytest `
            source/isaaclab/test/deps `
            --ignore=tools/conftest.py `
            -m windows_ci `
            --continue-on-collection-errors `
            --timeout=60 `
            --timeout-method=thread `
            -v `
            --junitxml=reports/deps-smoke.xml

      - name: Path-IO tests (utils)
        id: test-pathio
        if: false  # disabled: probe-only iteration
        continue-on-error: true
        shell: powershell
        timeout-minutes: 10
        run: |
          $ErrorActionPreference = "Stop"
          & "env_isaaclab_uv\Scripts\Activate.ps1"
          # Explicit files only; neighbor tests import AppLauncher/argparse at
          # module load and crash on Windows without Sim initialised.
          python -m pytest `
            source/isaaclab/test/utils/test_configclass.py `
            source/isaaclab/test/utils/test_dict.py `
            source/isaaclab/test/utils/test_episode_data.py `
            source/isaaclab/test/utils/test_hdf5_dataset_file_handler.py `
            --continue-on-collection-errors `
            --timeout=120 `
            --timeout-method=thread `
            -v `
            --junitxml=reports/path-io.xml

      - name: Kit headless boot smoke
        id: test-kit-launch
        if: false  # disabled: probe-only iteration
        continue-on-error: true
        shell: powershell
        timeout-minutes: 8
        run: |
          $ErrorActionPreference = "Stop"
          & "env_isaaclab_uv\Scripts\Activate.ps1"
          $script = @'
          import sys
          from isaaclab.app import AppLauncher

          app_launcher = AppLauncher(headless=True)
          sim = app_launcher.app
          assert sim is not None, "AppLauncher did not return a SimulationApp"
          sim.close()
          sys.exit(0)
          '@
          $script | Out-File -FilePath kit_launch_smoke.py -Encoding utf8
          $proc = Start-Process -PassThru -NoNewWindow -FilePath python -ArgumentList "kit_launch_smoke.py"
          if (-not $proc.WaitForExit(300000)) {
            Write-Host "::error::kit-launch hard timeout (5 min) - Kit hung; killing python tree"
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            $proc.WaitForExit()
            exit 124
          }
          exit $proc.ExitCode

      # Only the state subcase runs on Windows; the perception subcase needs
      # Vulkan, which the L40S runner can't provide (see disabled perception
      # step below). Drop the `-k 'not perception'` filter when that unblocks.
      - name: Cartpole training smoke (state rsl_rl)
        id: test-training-smoke
        if: false  # disabled: probe-only iteration
        continue-on-error: true
        shell: powershell
        timeout-minutes: 15
        run: |
          $ErrorActionPreference = "Stop"
          & "env_isaaclab_uv\Scripts\Activate.ps1"
          python -m pytest `
            source/isaaclab_tasks/test/test_cartpole_training_smoke.py `
            -k "not perception" `
            --continue-on-collection-errors `
            --timeout=600 `
            --timeout-method=thread `
            -v `
            --junitxml=reports/training-smoke.xml

      # ---------------------------------------------------------------------
      # Cartpole-camera perception smoke — DISABLED.
      #
      # Why disabled: the L40S on the Windows runner is a Data Center GPU,
      # and NVIDIA's data-center Windows driver does not expose Vulkan /
      # DirectX / OpenGL on bare metal (vGPU is required). Symptom is
      # `vkEnumeratePhysicalDevices failed. No physical device is found.`
      # followed by `gpu.foundation.plugin: TCC is not supported. GPU(s)
      # should be in WDDM mode.`, after which Kit hangs in
      # `omni.gpu_foundation_factory` until the OS-level watchdog kills it.
      # Driver policy: https://docs.nvidia.com/datacenter/tesla/tesla-release-notes-573-96/index.html
      #
      # Unblock when ONE of:
      #   - NVIDIA vGPU is licensed and configured on the Windows runner
      #     pool (Q-profile exposes Vulkan on the L40S).
      #   - The Windows runner pool is migrated to a bare-metal-Vulkan SKU
      #     (e.g. RTX A6000 / RTX 5000 Ada / consumer RTX).
      #   - Perception coverage moves to a Linux runner (the L40S Linux
      #     driver exposes Vulkan on bare metal without vGPU).
      #
      # When restoring: re-add the perception entry to the Aggregate step's
      # $results map and `perception_smoke.py` to the artifact upload paths.
      # ---------------------------------------------------------------------
      # - name: Cartpole-camera perception smoke (RTX / Vulkan path)
      #   id: test-perception
      #   if: always() && steps.sim-paths.outcome == 'success'
      #   continue-on-error: true
      #   shell: powershell
      #   timeout-minutes: 8
      #   run: |
      #     $ErrorActionPreference = "Stop"
      #     & "env_isaaclab_uv\Scripts\Activate.ps1"
      #     $script = @'
      #     import sys
      #     from isaaclab.app import AppLauncher
      #     app_launcher = AppLauncher(headless=True, enable_cameras=True)
      #     sim = app_launcher.app
      #     assert sim is not None, "AppLauncher did not return a SimulationApp"
      #     import gymnasium as gym
      #     import isaaclab_tasks  # noqa: F401  (gym env registration)
      #     env = gym.make("Isaac-Cartpole-RGB-Camera-Direct-v0", num_envs=1)
      #     obs, info = env.reset()
      #     assert obs is not None, "env.reset returned None observation"
      #     for step_i in range(3):
      #         action = env.action_space.sample()
      #         obs, reward, terminated, truncated, info = env.step(action)
      #         assert obs is not None, f"env.step {step_i} returned None observation"
      #     env.close()
      #     sim.close()
      #     sys.exit(0)
      #     '@
      #     $script | Out-File -FilePath perception_smoke.py -Encoding utf8
      #     $proc = Start-Process -PassThru -NoNewWindow -FilePath python -ArgumentList "perception_smoke.py"
      #     if (-not $proc.WaitForExit(180000)) {
      #       Write-Host "::error::perception hard timeout (3 min) - Kit/Vulkan hung; killing python tree"
      #       Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
      #       $proc.WaitForExit()
      #       exit 124
      #     }
      #     exit $proc.ExitCode

      # Last test step — destructively uninstalls editable isaaclab and
      # reinstalls from the built wheel. Placed last so the test branches
      # above run against the editable install.
      - name: Wheel build + reinstall + smoke import
        id: test-wheel-build
        if: false  # disabled: probe-only iteration
        continue-on-error: true
        shell: powershell
        timeout-minutes: 20
        run: |
          $ErrorActionPreference = "Stop"
          & "env_isaaclab_uv\Scripts\Activate.ps1"
          $gitBash = "C:\Program Files\Git\bin\bash.exe"
          if (-not (Test-Path $gitBash)) { throw "Git Bash not found at $gitBash" }
          # git-bash on Windows ships `python` only, not `python3`.
          $env:PYTHON = "python"
          & $gitBash tools/wheel_builder/build.sh
          if ($LASTEXITCODE -ne 0) { throw "wheel_builder/build.sh failed with exit $LASTEXITCODE" }
          $wheel = Get-ChildItem -Path "tools/wheel_builder/build/dist" -Filter "isaaclab-*.whl" | Select-Object -First 1
          if (-not $wheel) { throw "no wheel found in tools/wheel_builder/build/dist" }
          uv pip uninstall isaaclab
          uv pip install "$($wheel.FullName)[all]"
          python -c "import isaaclab; print('wheel install ok:', isaaclab.__file__)"

      # ===== Reporting + cleanup. =====

      - name: Upload all test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-ci-reports
          path: |
            reports/
            kit_launch_smoke.py
          retention-days: 7
          if-no-files-found: ignore

      # Probe-only mode: gate the job purely on the Vulkan probe step.
      # All other test steps are disabled (if: false) so the job runs fast
      # while we iterate on Vulkan diagnosis. Restore the full gating list
      # when re-enabling the test steps.
      - name: Aggregate test results
        if: always()
        shell: powershell
        run: |
          Write-Host "=== windows-ci step outcomes ==="
          "{0,-16} {1}" -f "vulkan-probe", "${{ steps.vulkan-probe.outcome }}"
          if ("${{ steps.vulkan-probe.outcome }}" -eq "failure") {
            Write-Host "::error::vulkan-probe failed"
            exit 1
          }

      - name: Report instance state + cleanup (AFTER)
        if: always()
        uses: ./.github/actions/windows-instance-state
        with: { phase: post }
